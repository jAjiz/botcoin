name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2 # v6.0.2

      - name: Build dev image
        run: docker compose -f docker-compose.test.yml build

      - name: ruff check
        run: docker compose -f docker-compose.test.yml run --rm test ruff check .

      - name: ruff format --check
        run: docker compose -f docker-compose.test.yml run --rm test ruff format --check .

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2 # v6.0.2

      - name: Build dev image
        run: docker compose -f docker-compose.test.yml build

      - name: Run unit tests
        run: docker compose -f docker-compose.test.yml run --rm test pytest tests/unit

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: DBbotc
          POSTGRES_USER: botc
          POSTGRES_PASSWORD: botc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U botc -d DBbotc"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2 # v6.0.2

      - name: Build dev image
        run: docker compose -f docker-compose.test.yml build

      - name: Apply Alembic migrations
        run: |
          docker compose -f docker-compose.test.yml run --rm \
            -e DATABASE_URL=postgresql+psycopg://botc:botc@127.0.0.1:5432/DBbotc \
            --network host \
            test alembic upgrade head

      - name: Run integration tests
        run: |
          docker compose -f docker-compose.test.yml run --rm \
            -e DATABASE_URL=postgresql+psycopg://botc:botc@127.0.0.1:5432/DBbotc \
            -e RUN_DB_INTEGRATION=true \
            --network host \
            test pytest tests/integration

  build-and-push:
    name: Build and push image
    needs: [lint, unit, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Compute image tag
        id: meta
        run: echo "image_tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/jajiz/botc:${{ steps.meta.outputs.image_tag }}
            ghcr.io/jajiz/botc:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: SSH and roll out
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_KEY }}
          envs: DEPLOY_PATH,IMAGE_TAG,COMMIT_SHA
          script: |
            set -euo pipefail
            mkdir -p "$DEPLOY_PATH"
            curl -fsSL "https://raw.githubusercontent.com/jAjiz/BoTC/${COMMIT_SHA}/docker-compose.yml" \
              -o "$DEPLOY_PATH/docker-compose.yml"
            curl -fsSL "https://raw.githubusercontent.com/jAjiz/BoTC/${COMMIT_SHA}/docker-compose.prod.yml" \
              -o "$DEPLOY_PATH/docker-compose.prod.yml"
            cd "$DEPLOY_PATH"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
        env:
          DEPLOY_PATH: ${{ secrets.VM_DEPLOY_PATH }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          COMMIT_SHA: ${{ github.sha }}
