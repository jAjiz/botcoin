apiVersion: 1

datasources:
  - name: PostgreSQL
    type: postgres
    access: proxy
    uid: botc-postgres
    url: postgres:5432
    user: grafana_reader
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      password: ${GRAFANA_DB_PASSWORD}
    editable: false
