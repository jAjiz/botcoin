services:
  botc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: botc
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TELEGRAM_SERVICE_URL: http://telegram:8001
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - botc_backend
    command: ["uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000"]

  telegram:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: botc-telegram
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_BASE_URL: http://botc:8000
    depends_on:
      botc:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - botc_backend
    command: ["uvicorn", "services.telegram.app:app", "--host", "0.0.0.0", "--port", "8001"]

  postgres:
    image: postgres:16-alpine
    container_name: botc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-DBbotc}
      POSTGRES_USER: ${POSTGRES_USER:-botc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - botc_backend

  grafana:
    image: grafana/grafana:11.4.0
    container_name: botc-grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
      # Consumed by datasources/postgres.yaml below.
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD:?GRAFANA_DB_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-DBbotc}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - gf_data:/var/lib/grafana
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - botc_backend

volumes:
  pg_data:
  gf_data:

networks:
  botc_backend:
    driver: bridge
