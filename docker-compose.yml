services:
  botc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: botc
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TELEGRAM_SERVICE_URL: http://telegram:8001
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - botc_backend
    command: ["uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000"]

  telegram:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: botc-telegram
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_BASE_URL: http://botc:8000
    depends_on:
      botc:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - ./logs:/app/logs
    networks:
      - botc_backend
    command: ["uvicorn", "services.telegram.app:app", "--host", "0.0.0.0", "--port", "8001"]

  postgres:
    image: postgres:16-alpine
    container_name: botc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-DBbotc}
      POSTGRES_USER: ${POSTGRES_USER:-botc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - botc_backend

volumes:
  pg_data:

networks:
  botc_backend:
    driver: bridge
